<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>F1 GRAND PRIX – Prywatne Nagranie CIA</title>
  <style>
    :root {
      --bg: #000;
      --neon: #ffffff;
      --glow: rgba(255,255,255,0.7);
      --dim: rgba(255,255,255,0.2);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: var(--bg);
      color: var(--neon);
      font-family: Impact, 'Arial Black', sans-serif;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 20%, #222 0%, #000 70%);
      overflow-x: hidden;
    }
    #hero {
      height: 40vh;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: clamp(3rem, 12vw, 7rem);
      letter-spacing: 0.4em;
      text-transform: uppercase;
      text-shadow: 
        0 0 10px var(--neon),
        0 0 20px var(--neon),
        0 0 40px #00ffff44,
        0 0 80px #00ffff22;
      animation: glitch 5s infinite alternate;
    }
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      15% { transform: translate(-3px, 3px); }
      30% { transform: translate(3px, -3px); }
      50% { transform: translate(-2px, 2px); }
    }
    .player-box {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-width: 1000px;
      margin: 0 auto 30px;
      padding: 0 12px;
    }
    .player-wrapper {
      position: relative;
      width: 100%;
      height: 0;
      padding-bottom: 56.25%; /* 16:9 */
      border: 2px solid var(--neon);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 0 50px var(--glow), inset 0 0 30px var(--dim);
    }
    iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
    footer {
      text-align: center;
      padding: 20px;
      font-size: 1rem;
      color: #444;
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
    }
  </style>
</head>
<body>
  <section id="hero">
    <h1>F1 GRAND PRIX</h1>
  </section>

  <div class="player-box">
    <div class="player-wrapper">
      <iframe 
        src="https://drive.google.com/file/d/1Y4TnQjd3f0Z0OXa6EjpHoYXwn5ta0B0i/preview?autoplay=1" 
        allow="autoplay; encrypted-media; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <footer>Prywatne nagranie • CIA • 2026</footer>
</body>
</html>
